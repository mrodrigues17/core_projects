<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
</head>
<body>
    <h1>Chatbot</h1>
    <form action="/chatbot" method="post">
        <label for="question">Enter your question:</label>
        <input type="text" id="question" name="question">
        <input type="submit" value="Submit">
    </form>
    <div>
        <strong>Response:</strong>
        <p>{{ response }}</p>
    </div>
</body>
</html>
